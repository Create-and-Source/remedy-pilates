<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Remedy Pilates & Barre</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAF6F1; color: #2D2A26;
    }
    .container {
      text-align: center; padding: 40px 24px; max-width: 440px;
    }
    .icon {
      width: 64px; height: 64px; border-radius: 16px; background: #C4704B;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 28px; color: #fff;
    }
    h1 {
      font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.3px;
    }
    p {
      font-size: 15px; color: #8A847D; line-height: 1.6; margin-bottom: 28px;
    }
    button {
      padding: 12px 32px; border-radius: 100px; border: none;
      background: #C4704B; color: #fff; font: 500 14px 'Outfit', sans-serif;
      cursor: pointer; transition: transform 0.2s;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: scale(0.97); }
    .status {
      margin-top: 20px; font-size: 12px; color: #BBB;
      font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">R</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Your data is safely stored on this device — reconnect and everything will be right where you left it.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <div class="status">Remedy Pilates & Barre</div>
  </div>
</body>
</html>
